name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: migrations apply cleanly + the app boots and is healthy ──
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: canvex
          POSTGRES_USER: canvex
          POSTGRES_PASSWORD: canvex
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U canvex -d canvex"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://canvex:canvex@localhost:5432/canvex
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      ENVIRONMENT: test
      RUN_MIGRATIONS_ON_STARTUP: "false"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply migrations (validates every migration incl. pgvector)
        run: alembic upgrade head
      - name: Import the app (syntax + wiring smoke test)
        run: python -c "import app.main; print('app imported OK')"
      - name: Boot the server and hit the readiness probe
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health/ready; then READY=1; break; fi
            sleep 1
          done
          kill $SERVER_PID || true
          test "$READY" = "1" || (echo "server never became ready" && exit 1)

  # ── Frontend: type-check + production build ──
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check and build
        run: npm run build

  # ── Deploy: only on push to main, only if tests passed ──
  deploy:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Secrets can't be used directly in `if:` — map to an env var first.
      - name: Trigger Render deploy (backend + workers)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
      # Vercel auto-deploys the frontend on every push to main via its Git
      # integration, so no explicit trigger is needed here.
      - name: Note
        run: echo "Backend deploy triggered; Vercel auto-deploys the frontend."
